networks:
  scouts_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: scouts_postgres
    restart: unless-stopped
    networks: [scouts_net]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scouts_db}
      POSTGRES_USER: ${POSTGRES_USER:-scouts_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scouts_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-scouts_user} -d ${POSTGRES_DB:-scouts_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: scouts_redis
    restart: unless-stopped
    networks: [scouts_net]
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: scouts_api
    restart: unless-stopped
    networks: [scouts_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages:/app/packages
      - uploads_data:/app/apps/api/uploads
    env_file: ./apps/api/.env
    ports:
      - '3001:3001'

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: scouts_worker
    restart: unless-stopped
    networks: [scouts_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages:/app/packages
      - uploads_data:/app/apps/api/uploads
    env_file: ./apps/api/.env
    command: ['tsx', 'watch', 'src/jobs/worker.ts']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: scouts_web
    restart: unless-stopped
    networks: [scouts_net]
    depends_on:
      - api
    volumes:
      - ./apps/web/app:/app/apps/web/app
      - ./apps/web/components:/app/apps/web/components
      - ./apps/web/lib:/app/apps/web/lib
      - ./apps/web/messages:/app/apps/web/messages
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    env_file: ./apps/web/.env.local
    ports:
      - '3000:3000'

  nginx:
    image: nginx:1.25-alpine
    container_name: scouts_nginx
    restart: unless-stopped
    networks: [scouts_net]
    depends_on:
      - web
      - api
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/var/www/uploads:ro
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3
